# ============================================================
# GitHub Actions — PW_Automation Corporate Framework
#
# Triggers:
#   1. Push / PR merge to main
#   2. Daily at 08:00 IST (02:30 UTC) Mon–Fri
#   3. Manual dispatch with env + suite picker
# ============================================================
name: PW Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: "30 2 * * 1-5"      # 08:00 IST Mon–Fri
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        default: "staging"
        type: choice
        options: [ staging, production, local ]
      suite:
        description: "Test suite to run (marker)"
        default: ""
        type: choice
        options: [ "", smoke, regression, api, web, mobile ]
      parallel:
        description: "Number of parallel workers"
        default: "2"
        type: string

jobs:
  test:
    name: "${{ github.event.inputs.suite || 'full' }} | ${{ github.event.inputs.environment || 'staging' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENVIRONMENT:    ${{ github.event.inputs.environment || 'staging' }}
      EMAIL_SENDER:   ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      PROD_USERNAME:  ${{ secrets.PROD_USERNAME }}
      PROD_PASSWORD:  ${{ secrets.PROD_PASSWORD }}
      HEADLESS:       "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run tests
        run: |
          WORKERS="${{ github.event.inputs.parallel || '2' }}"
          SUITE="${{ github.event.inputs.suite }}"
          CMD="pytest -v -n $WORKERS --alluredir=allure-results --clean-alluredir"
          if [ -n "$SUITE" ]; then CMD="$CMD -m $SUITE"; fi
          $CMD

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ github.run_number }}
          path: allure-results/
          retention-days: 14

      - name: Get Allure history
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy Allure to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
